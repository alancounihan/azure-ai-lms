        id: "3.1", title: "Computer Vision Fundamentals", duration: "8 min",

        content: `**Prompt Engineering** is the practice of crafting effective inputs (prompts) to elicit optimal outputs from generative AI models. It's both an art and a science.\n\n**Core Prompting Techniques:**\n\n**Zero-Shot Prompting** – Ask the model to perform a task with no examples:\n"Classify this review as positive or negative: 'The product broke after a week.'"\n\n**Few-Shot Prompting** – Provide 2-5 examples before the actual task:\n"Positive: 'Amazing product!' → Positive\nNegative: 'Terrible quality' → Negative\nNow classify: 'Works exactly as described.'"\n\n**Chain-of-Thought (CoT)** – Ask the model to reason step-by-step:\n"Solve this math problem. Think step-by-step before giving the answer."\n\n**System Prompt / System Message** – Instructions placed at the start that define the AI's persona, scope, and behavior:\n"You are a helpful Azure IT support assistant. Only answer questions about Microsoft Azure. Be concise and professional."\n\n**Temperature & Parameters:**\n• **Temperature (0–2)** – Lower = more deterministic; Higher = more creative\n• **Max tokens** – Limits response length\n• **Top-p** – Controls diversity of outputs\n\n**Prompt Engineering Best Practices:**\n✅ Be specific and detailed\n✅ Use clear formatting (bullets, sections)\n✅ Specify the desired output format\n✅ Provide context and examples\n✅ Iterate and test systematically\n❌ Don't be vague or ambiguous\n❌ Avoid very long, complex single prompts without structure\n\n**Retrieval Augmented Generation (RAG):** Enhances LLM responses by retrieving relevant information from a knowledge base before generating. Reduces hallucinations.`

const ModuleView = ({ mod, state, setState, navigate, showXP }) => {
  const [activeLesson, setActiveLesson] = useState(null);
  const [justCompleted, setJustCompleted] = useState(null);

  const modLessonsCompleted = mod.lessons.filter(l => state.completedLessons.includes(l.id));
  const allDone = modLessonsCompleted.length === mod.lessons.length;
  const quizDone = !!state.completedQuizzes[mod.id];

  const completeLesson = (lesson) => {
    if (state.completedLessons.includes(lesson.id)) return;
    const xpGain = 50;
    const newCompleted = [...state.completedLessons, lesson.id];
    const newSessionLessons = [...(state.sessionLessons || []), lesson.id];
    const newBadges = [...state.badges];

    if (newCompleted.length === 1 && !newBadges.includes("first_lesson")) {
      newBadges.push("first_lesson");
    }

    const newState = { ...state, completedLessons: newCompleted, xp: state.xp + xpGain, badges: newBadges, sessionLessons: newSessionLessons };
    setState(newState);
    saveState(newState);
    showXP(xpGain);
    setJustCompleted(lesson.id);
    setTimeout(() => setJustCompleted(null), 2000);
  };

  const formatContent = (text) => {
    return text.split('\n').map((line, i) => {
      if (line.startsWith('**') && line.endsWith('**')) {
        return <h4 key={i} className="font-bold text-white mt-4 mb-1">{line.replace(/\*\*/g, '')}</h4>;
      }
      if (line.startsWith('• ')) {
        const content = line.substring(2).replace(/\*\*([^*]+)\*\*/g, (_, t) => `<strong class="text-blue-300">${t}</strong>`);
        return <li key={i} className="text-gray-300 text-sm mb-1" dangerouslySetInnerHTML={{ __html: content }} />;
      }
      if (line.startsWith('✅') || line.startsWith('❌')) {
        return <div key={i} className="text-sm text-gray-300 mb-1">{line}</div>;
      }
      if (line.trim() === '') return <div key={i} className="mb-2" />;
      const html = line.replace(/\*\*([^*]+)\*\*/g, (_, t) => `<strong class="text-blue-300">${t}</strong>`);
      return <p key={i} className="text-gray-300 text-sm mb-2" dangerouslySetInnerHTML={{ __html: html }} />;
    });
  };

  return (
    <div className="fade-in p-4 md:p-6 max-w-4xl mx-auto">
      {/* Header */}
      <button onClick={() => navigate("dashboard")} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4 transition-colors">
        ← Back to Dashboard
      </button>

      <div className={`rounded-2xl p-6 mb-6 bg-gradient-to-br ${mod.gradient} relative overflow-hidden`} style={{ border: `1px solid ${mod.accentColor}40` }}>
        <div className="absolute inset-0 opacity-20" style={{ backgroundImage: "radial-gradient(circle at 80% 20%, white 0%, transparent 60%)" }} />
        <div className="relative z-10">
          <div className="text-4xl mb-2">{mod.icon}</div>
          <h1 className="text-2xl font-bold text-white mb-1">{mod.title}</h1>
          <p className="text-white/70 text-sm mb-3">{mod.description}</p>
          <div className="flex gap-4 text-sm text-white/80 flex-wrap">
            <span className="flex items-center gap-1"><Icon name="clock" size={14} /> {mod.estimatedTime}</span>
            <span className="flex items-center gap-1"><Icon name="book" size={14} /> {mod.lessons.length} lessons</span>
            <span className="flex items-center gap-1"><Icon name="lightning" size={14} /> +{mod.xpReward} XP total</span>
          </div>
        </div>
      </div>

      <div className="flex gap-2 mb-4 items-center text-sm text-gray-400">
        <span className="font-medium text-white">{modLessonsCompleted.length}/{mod.lessons.length} lessons complete</span>
        <ProgressBar value={modLessonsCompleted.length} max={mod.lessons.length} color={mod.accentColor} />
      </div>

      {/* Lessons */}
      <div className="space-y-3 mb-6">
        {mod.lessons.map((lesson, i) => {
          const done = state.completedLessons.includes(lesson.id);
          const open = activeLesson === lesson.id;
          return (
            <div key={lesson.id} className="rounded-xl border overflow-hidden" style={{ background: "#0d1117", borderColor: done ? mod.accentColor + "50" : "#1f2937" }}>
              <button
                className="w-full flex items-center gap-3 p-4 text-left"
                onClick={() => setActiveLesson(open ? null : lesson.id)}
              >
                <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-bold transition-all ${done ? "" : "border-2 border-gray-700 text-gray-600"}`}
                  style={done ? { background: mod.accentColor + "30", color: mod.accentColor } : {}}>
                  {done ? "✓" : i + 1}
                </div>
                <div className="flex-1">
                  <div className="font-semibold text-white text-sm">{lesson.title}</div>
                  <div className="text-xs text-gray-500 flex items-center gap-1 mt-0.5">
                    <Icon name="clock" size={11} /> {lesson.duration}

                  </div>
                </div>
                <span className="text-gray-500 transition-transform" style={{ transform: open ? "rotate(90deg)" : "none" }}>›</span>

              {open && (

          <div>
            <h3 className="font-bold text-white mb-1">
              {quizDone ? "✅ Quiz Passed!" : "📝 Module Quiz"}

            <p className="text-sm text-gray-400">
              {quizDone
                ? `You scored ${state.completedQuizzes[mod.id].score}/5 · ${state.completedQuizzes[mod.id].score === 5 ? "Perfect score! 🎯" : "Great work!"}`

            <button

            >
              {allDone ? "Take Quiz → +100 XP" : "🔒 Locked"}

        </div>
      </div>
    </div>
  );
};

const QuizView = ({ mod, state, setState, navigate, showXP }) => {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [answers, setAnswers] = useState([]);
  const [finished, setFinished] = useState(false);
  const [score, setScore] = useState(0);

  if (state.completedQuizzes[mod.id]) {
    return (
      <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
        <button onClick={() => navigate("module", mod.id)} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4">← Back to Module</button>
        <div className="bg-gray-900 border border-green-500/40 rounded-2xl p-8 text-center">
          <div className="text-6xl mb-4">✅</div>
          <h2 className="text-2xl font-bold text-white mb-2">Quiz Already Passed!</h2>
          <p className="text-gray-400">Score: {state.completedQuizzes[mod.id].score}/5</p>
          <button onClick={() => navigate("module", mod.id)} className="btn-primary mt-6 px-8 py-3 rounded-xl text-white font-bold">Back to Module</button>
        </div>
      </div>
    );
  }

  const question = mod.quiz[current];
  const total = mod.quiz.length;

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    const correct = idx === question.correct;
    setAnswers(prev => [...prev, correct]);
    if (correct) setScore(s => s + 1);
  };

  const handleNext = () => {
    if (current < total - 1) {
      setCurrent(c => c + 1);
      setSelected(null);
      setAnswered(false);
    } else {
      const finalScore = answers.filter(Boolean).length + (selected === question.correct ? 1 : 0);
      finishQuiz(finalScore);
    }
  };

  const finishQuiz = (finalScore) => {
    const actualScore = score + (selected === question.correct ? 0 : 0); // score already updated
    const perfect = actualScore === 5;
    const xpGain = perfect ? 150 : actualScore >= 3 ? 100 : 50;
    const newBadges = [...state.badges];
    const badgesToCheck = [];

    if (perfect && !newBadges.includes("quiz_ace")) {
      newBadges.push("quiz_ace");
      badgesToCheck.push("quiz_ace");
    }
    if (mod.badgeId && !newBadges.includes(mod.badgeId)) {
      newBadges.push(mod.badgeId);
    }

    const perfectQuizzes = Object.values(state.completedQuizzes).filter(q => q.score === 5).length + (perfect ? 1 : 0);
    if (perfectQuizzes >= 3 && !newBadges.includes("perfect_3")) {
      newBadges.push("perfect_3");
    }

    const newXP = state.xp + xpGain;
    if (newXP >= 3000 && !newBadges.includes("azure_ready")) {
      newBadges.push("azure_ready");
    }

    const newCompletedQuizzes = { ...state.completedQuizzes, [mod.id]: { score: actualScore, perfect } };
    const newCompletedLessons = state.completedLessons;
    const allModulesDone = MODULES.every(m =>
      m.lessons.every(l => newCompletedLessons.includes(l.id)) && !!newCompletedQuizzes[m.id]
    );
    if (allModulesDone && !newBadges.includes("ai_champion")) {
      newBadges.push("ai_champion");
    }

    const sessionIds = state.sessionLessons || [];
    const sessionModLessons = mod.lessons.filter(l => sessionIds.includes(l.id));
    if (sessionModLessons.length === mod.lessons.length && !newBadges.includes("speed_runner")) {
      newBadges.push("speed_runner");
    }

    const newState = { ...state, xp: newXP, completedQuizzes: newCompletedQuizzes, badges: newBadges };
    setState(newState);
    saveState(newState);
    showXP(xpGain);
    setScore(actualScore);
    setFinished(true);
  };

  if (finished) {
    const perfect = score === 5;
    const pass = score >= 3;
    return (
      <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
        <div className={`rounded-2xl p-8 text-center border ${perfect ? "border-green-500/50 glow-green" : pass ? "border-blue-500/40" : "border-red-500/30"}`}
          style={{ background: "linear-gradient(135deg, #0d1117, #111827)" }}>
          <div className="text-6xl mb-4 badge-bounce">{perfect ? "🎯" : pass ? "🎉" : "📚"}</div>
          <h2 className="text-3xl font-black text-white mb-2">
            {perfect ? "Perfect Score!" : pass ? "Quiz Passed!" : "Keep Studying!"}
          </h2>
          <div className="text-5xl font-black mb-2" style={{ color: perfect ? "#10b981" : pass ? "#0078d4" : "#ef4444" }}>
            {score}<span className="text-gray-500 text-2xl">/{total}</span>
          </div>
          <p className="text-gray-400 mb-2">{perfect ? "+150 XP earned" : pass ? "+100 XP earned" : "+50 XP earned"}</p>
          {perfect && <p className="text-green-400 text-sm mb-4">🏅 You earned the "Quiz Ace" badge!</p>}
          <div className="grid grid-cols-5 gap-2 my-6">
            {mod.quiz.map((q, i) => {
              const ans = i < answers.length ? answers[i] : null;
              return (
                <div key={i} className={`h-8 rounded-lg flex items-center justify-center text-sm font-bold ${ans === true ? "bg-green-500/30 text-green-400" : ans === false ? "bg-red-500/30 text-red-400" : "bg-gray-800 text-gray-600"}`}>
                  {ans === true ? "✓" : ans === false ? "✗" : "?"}
                </div>
              );
            })}
          </div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={() => navigate("module", mod.id)} className="btn-primary px-6 py-3 rounded-xl text-white font-bold text-sm">
              {pass ? "Continue Learning" : "Review Module"}
            </button>
            <button onClick={() => navigate("leaderboard")} className="px-6 py-3 rounded-xl font-bold text-sm border border-gray-700 text-gray-300 hover:border-gray-500 transition-colors">
              See Leaderboard
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
      <button onClick={() => navigate("module", mod.id)} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4">← Back to Module</button>

      {/* Quiz Header */}
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="font-bold text-white">{mod.title}</h2>
          <p className="text-xs text-gray-500">Question {current + 1} of {total}</p>
        </div>
        <div className="text-right">
          <div className="text-sm font-bold text-white">{score} correct</div>
          <div className="text-xs text-gray-500">so far</div>
        </div>
      </div>

      {/* Progress dots */}
      <div className="flex gap-1.5 mb-6">
        {mod.quiz.map((_, i) => (
          <div key={i} className={`h-1.5 flex-1 rounded-full transition-all ${i < current ? "bg-blue-500" : i === current ? "bg-blue-400" : "bg-gray-700"}`} />
        ))}
      </div>

      {/* Question Card */}
      <div className="bg-gray-900 rounded-2xl p-6 border border-gray-800 mb-4">
        <p className="text-white font-semibold text-base md:text-lg leading-relaxed">{question.q}</p>
      </div>

      {/* Options */}
      <div className="space-y-3 mb-6">
        {question.options.map((opt, idx) => {
          let cls = "quiz-option bg-gray-900 rounded-xl p-4 w-full text-left text-sm text-gray-300 flex items-center gap-3";
          if (answered) {
            if (idx === question.correct) cls += " correct";
            else if (idx === selected) cls += " wrong";
          }
          return (
            <button key={idx} className={cls} onClick={() => handleSelect(idx)} disabled={answered}>
              <span className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0 ${answered && idx === question.correct ? "border-green-500 bg-green-500/20 text-green-400" : answered && idx === selected ? "border-red-500 bg-red-500/20 text-red-400" : "border-gray-600 text-gray-500"}`}>
                {String.fromCharCode(65 + idx)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>

      {answered && (
        <div className="fade-in">
          <div className={`rounded-xl p-4 mb-4 ${selected === question.correct ? "bg-green-500/10 border border-green-500/30" : "bg-red-500/10 border border-red-500/30"}`}>
            <p className="text-sm font-semibold" style={{ color: selected === question.correct ? "#10b981" : "#ef4444" }}>
              {selected === question.correct ? "✓ Correct!" : "✗ Incorrect"} — The correct answer is: {question.options[question.correct]}
            </p>
          </div>
          <button onClick={handleNext} className="btn-primary w-full py-3.5 rounded-xl text-white font-bold text-sm">
            {current < total - 1 ? "Next Question →" : "Finish Quiz 🎉"}
          </button>
        </div>
      )}
    </div>
  );
};

// ─── LAYOUT ──────────────────────────────────────────────────────────────────

const navItems = [
  { id: "dashboard", label: "Home", icon: "home" },
  { id: "leaderboard", label: "Leaderboard", icon: "trophy" },
  { id: "achievements", label: "Achievements", icon: "star" },
];

function App() {
  const [state, setState] = useState(loadState);
  const [view, setView] = useState("dashboard");
  const [viewParam, setViewParam] = useState(null);
  const [xpPopups, setXpPopups] = useState([]);
  const popupId = useRef(0);

  // Update streak on mount
  useEffect(() => {
    const today = new Date().toDateString();
    if (state.lastLogin !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const newStreak = state.lastLogin === yesterday ? state.streak + 1 : 1;
      const newBadges = [...state.badges];
      if (newStreak >= 3 && !newBadges.includes("on_fire")) newBadges.push("on_fire");
      const newState = { ...state, lastLogin: today, streak: newStreak, badges: newBadges, sessionLessons: [] };
      setState(newState);
      saveState(newState);
    }
  }, []);

  const navigate = (v, param = null) => {
    setView(v);
    setViewParam(param);
    window.scrollTo(0, 0);
  };

  const showXP = useCallback((amount) => {
    const id = ++popupId.current;
    setXpPopups(prev => [...prev, { id, amount }]);
    setTimeout(() => setXpPopups(prev => prev.filter(p => p.id !== id)), 1500);
  }, []);

  const currentMod = viewParam ? MODULES.find(m => m.id === viewParam) : null;

  const renderView = () => {
    if (view === "module" && currentMod) return <ModuleView mod={currentMod} state={state} setState={setState} navigate={navigate} showXP={showXP} />;
    if (view === "quiz" && currentMod) return <QuizView mod={currentMod} state={state} setState={setState} navigate={navigate} showXP={showXP} />;
    if (view === "leaderboard") return <Leaderboard state={state} />;
    if (view === "achievements") return <AchievementsView state={state} />;
    return <Dashboard state={state} modules={MODULES} navigate={navigate} showXP={showXP} />;
  };

  const totalXP = MODULES.reduce((s, m) => s + m.xpReward + m.lessons.length * 50, 0);

  return (
    <div className="min-h-screen flex">
      {/* XP Popups */}
      {xpPopups.map(p => (
        <div key={p.id} className="xp-pop" style={{ top: "80px", left: "50%", transform: "translateX(-50%)" }}>+{p.amount} XP ⚡</div>
      ))}

      {/* Desktop Sidebar */}
      <aside className="sidebar fixed top-0 left-0 h-screen w-60 flex flex-col z-40" style={{ background: "#080c14", borderRight: "1px solid #1f2937" }}>
        {/* Logo */}
        <div className="p-5 border-b border-gray-800">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center text-lg" style={{ background: "linear-gradient(135deg, #0078d4, #00bcf2)" }}>☁️</div>
            <div>
              <div className="font-bold text-white text-sm">Azure AI</div>
              <div className="text-xs text-gray-500">Fundamentals LMS</div>
            </div>
          </div>
        </div>

        {/* User XP */}
        <div className="p-4 border-b border-gray-800">
          <div className="flex items-center gap-2 mb-2">
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style={{ background: "#0078d415", border: "2px solid #0078d4", color: "#0078d4" }}>AL</div>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-semibold text-white truncate">Alan</div>
              <LevelChip xp={state.xp} />
            </div>
          </div>
          <div className="flex justify-between text-xs text-gray-500 mb-1">
            <span>{state.xp.toLocaleString()} XP</span>
            <span>{getLevelProgress(state.xp)}%</span>
          </div>
          <ProgressBar value={state.xp} max={getLevel(state.xp).max === Infinity ? state.xp : getLevel(state.xp).max} color="#0078d4" height={4} />
          {state.streak > 0 && <div className="text-xs text-orange-400 mt-2 flex items-center gap-1 streak-fire"><span>🔥</span> {state.streak}-day streak</div>}
        </div>

        {/* Nav */}
        <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
          {navItems.map(item => (
            <button key={item.id} onClick={() => navigate(item.id)}
              className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all text-left ${view === item.id ? "active text-white" : "text-gray-400 hover:text-white"}`}>
              <Icon name={item.icon} size={16} />
              {item.label}
            </button>
          ))}

          <div className="pt-3 pb-1">
            <div className="text-xs text-gray-600 uppercase px-3 mb-1 font-semibold tracking-wider">Modules</div>
            {MODULES.map((mod, i) => {
              const done = mod.lessons.every(l => state.completedLessons.includes(l.id)) && state.completedQuizzes[mod.id];
              const locked = i > 0 && !MODULES.slice(0, i).every(prev => prev.lessons.every(l => state.completedLessons.includes(l.id)));
              return (
                <button key={mod.id} onClick={() => !locked && navigate("module", mod.id)}
                  className={`sidebar-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition-all text-left ${view === "module" && viewParam === mod.id ? "active text-white" : locked ? "text-gray-600 cursor-not-allowed" : "text-gray-400 hover:text-white"}`}>
                  <span>{mod.icon}</span>
                  <span className="flex-1 truncate">{mod.shortTitle}</span>
                  {done && <span className="text-green-400 text-xs">✓</span>}
                  {locked && <Icon name="lock" size={10} />}
                </button>
              );
            })}
          </div>
        </nav>

        {/* Bottom Stats */}
        <div className="p-4 border-t border-gray-800">
          <div className="grid grid-cols-3 gap-2 text-center">
            <div>
              <div className="text-sm font-bold text-white">{state.badges.length}</div>
              <div className="text-xs text-gray-600">Badges</div>
            </div>
            <div>
              <div className="text-sm font-bold text-white">{state.completedLessons.length}</div>
              <div className="text-xs text-gray-600">Lessons</div>
            </div>
            <div>
              <div className="text-sm font-bold text-white">{Object.keys(state.completedQuizzes).length}</div>
              <div className="text-xs text-gray-600">Quizzes</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main Content */}
      <main className="flex-1 min-h-screen main-content overflow-x-hidden">
        {/* Top bar */}
        <div className="sticky top-0 z-30 border-b border-gray-800 flex items-center gap-4 px-4 py-3" style={{ background: "rgba(8,12,20,0.95)", backdropFilter: "blur(12px)" }}>
          <div className="flex items-center gap-2 md:hidden">
            <span className="text-lg">☁️</span>
            <span className="font-bold text-white text-sm">Azure AI LMS</span>
          </div>
          <div className="flex-1" />
          <div className="flex items-center gap-3">
            {state.streak >= 1 && <span className="text-sm streak-fire hidden sm:flex items-center gap-1">🔥{state.streak}</span>}
            <div className="flex items-center gap-2 bg-gray-900 rounded-lg px-3 py-1.5 border border-gray-800">
              <Icon name="lightning" size={14} style={{ color: "#f59e0b" }} />
              <span className="font-bold text-white text-sm">{state.xp.toLocaleString()}</span>
              <span className="text-xs text-gray-500">XP</span>
            </div>
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style={{ background: "#0078d415", border: "2px solid #0078d4", color: "#0078d4" }}>AL</div>
          </div>
        </div>

        {/* Page content */}
        <div className="pb-4">{renderView()}</div>
      </main>

      {/* Mobile Bottom Nav */}
      <nav className="bottom-nav fixed bottom-0 left-0 right-0 z-40 border-t border-gray-800 justify-around px-2 py-2"
        style={{ background: "rgba(8,12,20,0.97)", backdropFilter: "blur(16px)" }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => navigate(item.id)}
            className={`bottom-nav-item flex flex-col items-center gap-0.5 px-4 py-1 rounded-lg ${view === item.id ? "active" : "text-gray-500"}`}>
            <Icon name={item.icon} size={20} />
            <span className="text-xs">{item.label}</span>
          </button>
        ))}
        {MODULES.slice(0, 2).map((mod) => (
          <button key={mod.id} onClick={() => navigate("module", mod.id)}
            className={`bottom-nav-item flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg ${view === "module" && viewParam === mod.id ? "active" : "text-gray-500"}`}>
            <span className="text-lg leading-5">{mod.icon}</span>
            <span className="text-xs">{mod.shortTitle.split(' ')[0]}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

try {
  const rootEl = document.getElementById("root");
  // Remove loading spinner before React takes over
  const loading = document.getElementById("loading");
  if (loading) loading.remove();
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App />);
} catch(e) {
  document.getElementById("root").innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#080c14;color:#ef4444;font-family:Inter,sans-serif;text-align:center;padding:2rem;">' +
    '<div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>' +
    '<div style="font-weight:700;margin-bottom:0.5rem;">Failed to load LMS</div>' +
    '<div style="color:#6b7280;font-size:0.85rem;">' + e.message + '</div>' +
    '</div>';
}
</script>
</body>
</html>
