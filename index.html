// ─── DEMO AUTH (localStorage fallback when Firebase not configured) ───────────
const DEMO_USERS_KEY = 'lms_demo_users_v1';
const DEMO_SESSION_KEY = 'lms_auth_session_v1';

const getDemoUsers = () => { try { return JSON.parse(localStorage.getItem(DEMO_USERS_KEY) || '[]'); } catch { return []; } };
const saveDemoUsers = u => localStorage.setItem(DEMO_USERS_KEY, JSON.stringify(u));
const getDemoSession = () => { try { const s = localStorage.getItem(DEMO_SESSION_KEY); return s ? JSON.parse(s) : null; } catch { return null; } };
const saveDemoSession = u => u ? localStorage.setItem(DEMO_SESSION_KEY, JSON.stringify(u)) : localStorage.removeItem(DEMO_SESSION_KEY);

const demoSignUp = (name, email, password) => {
  const users = getDemoUsers();
  if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) throw new Error('An account with this email already exists.');
  const user = { uid: 'demo_' + Date.now(), name: name.trim(), email: email.trim().toLowerCase(), photoURL: null };
  saveDemoUsers([...users, { ...user, password }]);
  saveDemoSession(user);
  return user;
};
const demoSignIn = (email, password) => {
  const users = getDemoUsers();
  const found = users.find(u => u.email.toLowerCase() === email.trim().toLowerCase() && u.password === password);
  if (!found) throw new Error('Incorrect email or password.');
  const session = { uid: found.uid, name: found.name, email: found.email, photoURL: found.photoURL };
  saveDemoSession(session);
  return session;
};
const demoSignOut = () => saveDemoSession(null);

      { id: "2.1", title: "Types of Machine Learning", duration: "10 min", content: `**1. Supervised Learning** — learns from labeled data.\n• **Regression** – Predicts continuous values. Example: house price prediction.\n• **Classification** – Predicts categories. Example: spam detection.\n\n**2. Unsupervised Learning** — finds patterns in unlabeled data.\n• **Clustering** – Groups similar items. Example: customer segmentation (K-means).\n• **Dimensionality Reduction** – Reduces features while preserving info.\n\n**3. Reinforcement Learning** — agent learns via rewards/penalties.\n• Example: game-playing AI, robot navigation.\n\n**Semi-Supervised Learning** – Small labeled data + large unlabeled data.\n\n**Transfer Learning** – Fine-tunes a pre-trained model for a new task.` },

          {/* Divider */}
          <div className="flex items-center gap-3 mb-4">
            <div className="flex-1 h-px" style={{ background: "rgba(255,255,255,0.1)" }} />
            <span className="text-gray-600 text-xs font-medium">or</span>
            <div className="flex-1 h-px" style={{ background: "rgba(255,255,255,0.1)" }} />
          </div>

          {/* Form */}
          <form onSubmit={handleSubmit} className="space-y-3">
            {mode === "signup" && (
              <div>
                <label className="block text-xs font-semibold text-gray-400 mb-1.5">Full Name</label>
                <input value={name} onChange={e=>setName(e.target.value)} required placeholder="Alan Counihan" className="auth-input w-full rounded-xl px-4 py-3 text-sm" />
              </div>
            )}
            <div>
              <label className="block text-xs font-semibold text-gray-400 mb-1.5">Email address</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="alan@company.com" className="auth-input w-full rounded-xl px-4 py-3 text-sm" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-400 mb-1.5">Password</label>
              <div className="relative">
                <input type={showPw ? "text" : "password"} value={password} onChange={e=>setPassword(e.target.value)} required placeholder={mode==="signup"?"At least 6 characters":"••••••••"} minLength={6} className="auth-input w-full rounded-xl px-4 py-3 pr-11 text-sm" />
                <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                  <Icon name={showPw?"eyeOff":"eye"} size={16} />
                </button>
              </div>
            </div>
            {error && (
              <div className="rounded-xl px-4 py-3 text-sm text-red-300 flex items-center gap-2" style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.25)" }}>
                <span>⚠️</span> {error}
              </div>
            )}
            <button type="submit" disabled={loading} className="btn-primary w-full rounded-xl py-3 text-white font-bold text-sm flex items-center justify-center gap-2 mt-1">
              {loading ? <div style={{ width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite" }} /> : null}
              {loading ? (mode==="signup"?"Creating account…":"Signing in…") : (mode==="signup"?"Create Account →":"Sign In →")}
            </button>
          </form>

          <p className="text-center text-gray-600 text-sm mt-5">
            {mode==="signin" ? "Don't have an account? " : "Already have an account? "}
            <button onClick={()=>{setMode(mode==="signin"?"signup":"signin");setError("");}} className="text-blue-400 hover:text-blue-300 font-semibold transition-colors">
              {mode==="signin" ? "Sign up free" : "Sign in"}
            </button>
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── MODULE VIEW ──────────────────────────────────────────────────────────────
function ModuleView({ mod, state, setState, navigate, showXP }) {
  const [activeLesson, setActiveLesson] = useState(null);
  const done = l => state.completedLessons.includes(l.id);
  const allDone = mod.lessons.every(done);
  const quizDone = !!state.completedQuizzes[mod.id];

  const completeLesson = lesson => {
    if (done(lesson)) return;
    const newBadges = [...state.badges];
    const newLessons = [...state.completedLessons, lesson.id];
    if (newLessons.length===1 && !newBadges.includes("first_lesson")) newBadges.push("first_lesson");
    const ns = { ...state, completedLessons:newLessons, xp:state.xp+50, badges:newBadges, sessionLessons:[...(state.sessionLessons||[]),lesson.id] };
    setState(ns); saveState(ns); showXP(50);
  };

  const fmt = text => text.split('\n').map((line,i)=>{
    if (line.startsWith('• ')) { const html=line.slice(2).replace(/\*\*([^*]+)\*\*/g,(_,t)=>`<strong class="text-blue-300">${t}</strong>`); return <li key={i} className="text-gray-300 text-sm mb-1 ml-2" dangerouslySetInnerHTML={{__html:html}}/>; }
    if (line.trim()==='') return <div key={i} className="mb-2"/>;
    const html=line.replace(/\*\*([^*]+)\*\*/g,(_,t)=>`<strong class="text-blue-300">${t}</strong>`);
    return <p key={i} className="text-gray-300 text-sm mb-2" dangerouslySetInnerHTML={{__html:html}}/>;
  });

  return (
    <div className="fade-in p-4 md:p-6 max-w-4xl mx-auto">
      <button onClick={()=>navigate("dashboard")} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4 transition-colors">← Back</button>
      <div className={`rounded-2xl p-6 mb-6 bg-gradient-to-br ${mod.gradient} relative overflow-hidden`}>
        <div className="absolute inset-0 opacity-20" style={{ backgroundImage:"radial-gradient(circle at 80% 20%,white 0%,transparent 60%)" }}/>
        <div className="relative z-10">
          <div className="text-4xl mb-2">{mod.icon}</div>
          <h1 className="text-2xl font-bold text-white mb-1">{mod.title}</h1>
          <p className="text-white/70 text-sm mb-3">{mod.description}</p>
          <div className="flex gap-4 text-sm text-white/80 flex-wrap">
            <span className="flex items-center gap-1"><Icon name="clock" size={14}/> {mod.estimatedTime}</span>
            <span className="flex items-center gap-1"><Icon name="book" size={14}/> {mod.lessons.length} lessons</span>
            <span className="flex items-center gap-1"><Icon name="lightning" size={14}/> +{mod.xpReward} XP</span>
          </div>
        </div>
      </div>
      <div className="space-y-3 mb-6">
        {mod.lessons.map((lesson,i)=>{
          const isOpen = activeLesson===lesson.id;
          const isDone = done(lesson);
          return (
            <div key={lesson.id} className="rounded-xl border overflow-hidden" style={{ background:"#0d1117", borderColor:isDone?mod.accentColor+"50":"#1f2937" }}>
              <button className="w-full flex items-center gap-3 p-4 text-left" onClick={()=>setActiveLesson(isOpen?null:lesson.id)}>
                <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-bold" style={isDone?{background:mod.accentColor+"30",color:mod.accentColor}:{border:"2px solid #374151",color:"#6b7280"}}>{isDone?"✓":i+1}</div>
                <div className="flex-1"><div className="font-semibold text-white text-sm">{lesson.title}</div><div className="text-xs text-gray-500 flex items-center gap-1 mt-0.5"><Icon name="clock" size={11}/> {lesson.duration}</div></div>
                <span className="text-gray-500 text-lg" style={{ transform:isOpen?"rotate(90deg)":"none", transition:"transform 0.2s" }}>›</span>
              </button>
              {isOpen && (
                <div className="px-4 pb-4 border-t border-gray-800">
                  <div className="mt-4 mb-4 pl-4 border-l-2" style={{ borderColor:mod.accentColor+"50" }}>
                    <ul className="space-y-0.5">{fmt(lesson.content)}</ul>
                  </div>
                  {!isDone ? (
                    <button onClick={()=>completeLesson(lesson)} className="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">
                      <Icon name="check" size={16}/> Mark Complete (+50 XP)
                    </button>
                  ) : (
                    <div className="flex items-center justify-center gap-2 py-2.5 rounded-xl text-green-400 font-semibold text-sm" style={{ background:"rgba(16,185,129,0.1)" }}>✓ Completed</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className={`rounded-2xl p-5 border ${quizDone?"border-green-500/40":allDone?"border-yellow-500/40 glow-blue":"border-gray-800 opacity-60"}`} style={{ background:quizDone?"rgba(16,185,129,0.05)":allDone?"rgba(0,120,212,0.08)":"#0d1117" }}>
        <div className="flex items-center justify-between flex-wrap gap-4">
          <div>
            <h3 className="font-bold text-white mb-1">{quizDone?"✅ Quiz Passed!":"📝 Module Quiz"}</h3>
            <p className="text-sm text-gray-400">{quizDone?`Score: ${state.completedQuizzes[mod.id].score}/5 ${state.completedQuizzes[mod.id].score===5?"— Perfect! 🎯":""}`:allDone?"All lessons done — test your knowledge!":"Complete all lessons to unlock the quiz."}</p>
          </div>
          {!quizDone && <button disabled={!allDone} onClick={()=>navigate("quiz",mod.id)} className={`px-6 py-2.5 rounded-xl font-bold text-sm transition-all ${allDone?"btn-primary text-white":"bg-gray-800 text-gray-600 cursor-not-allowed"}`}>{allDone?"Take Quiz → +100 XP":"🔒 Locked"}</button>}
        </div>
      </div>
    </div>
  );
}

// ─── QUIZ VIEW ────────────────────────────────────────────────────────────────
function QuizView({ mod, state, setState, navigate, showXP }) {
  const [curr, setCurr] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [results, setResults] = useState([]);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const q = mod.quiz[curr];

  if (state.completedQuizzes[mod.id]) return (
    <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
      <button onClick={()=>navigate("module",mod.id)} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4">← Back</button>
      <div className="bg-gray-900 border border-green-500/40 rounded-2xl p-8 text-center">
        <div className="text-5xl mb-4">✅</div>
        <h2 className="text-2xl font-bold text-white mb-2">Already Completed!</h2>
        <p className="text-gray-400">Score: {state.completedQuizzes[mod.id].score}/5</p>
        <button onClick={()=>navigate("module",mod.id)} className="btn-primary mt-6 px-8 py-3 rounded-xl text-white font-bold">Back to Module</button>
      </div>
    </div>
  );

  const pick = idx => {
    if (answered) return;
    setSelected(idx); setAnswered(true);
    const correct = idx===q.correct;
    setResults(prev=>[...prev,correct]);
    if (correct) setScore(s=>s+1);
  };

  const next = () => {
    if (curr < mod.quiz.length-1) { setCurr(c=>c+1); setSelected(null); setAnswered(false); }
    else finish();
  };

  const finish = () => {
    const finalScore = score + (selected===q.correct && results.length===curr ? 1 : 0);
    const actualScore = results.filter(Boolean).length + (answered && selected===q.correct ? 1 : 0);
    const perfect = actualScore===5;
    const xpGain = perfect?150:actualScore>=3?100:50;
    const nb = [...state.badges];
    if (perfect && !nb.includes("quiz_ace")) nb.push("quiz_ace");
    if (mod.badgeId && !nb.includes(mod.badgeId)) nb.push(mod.badgeId);
    const perfCount = Object.values(state.completedQuizzes).filter(q=>q.score===5).length+(perfect?1:0);
    if (perfCount>=3 && !nb.includes("perfect_3")) nb.push("perfect_3");
    const newXP = state.xp+xpGain;
    if (newXP>=3000 && !nb.includes("azure_ready")) nb.push("azure_ready");
    const newQuizzes = {...state.completedQuizzes,[mod.id]:{score:actualScore,perfect}};
    const allDone = MODULES.every(m=>m.lessons.every(l=>state.completedLessons.includes(l.id))&&!!newQuizzes[m.id]);
    if (allDone && !nb.includes("ai_champion")) nb.push("ai_champion");
    const sl = state.sessionLessons||[];
    if (mod.lessons.every(l=>sl.includes(l.id))&&!nb.includes("speed_runner")) nb.push("speed_runner");
    const ns = {...state,xp:newXP,completedQuizzes:newQuizzes,badges:nb};
    setState(ns); saveState(ns); showXP(xpGain);
    setScore(actualScore); setDone(true);
  };

  if (done) {
    const perfect = score===5; const pass = score>=3;
    return (
      <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
        <div className={`rounded-2xl p-8 text-center border ${perfect?"border-green-500/50 glow-green":pass?"border-blue-500/40":"border-red-500/30"}`} style={{ background:"linear-gradient(135deg,#0d1117,#111827)" }}>
          <div className="text-6xl mb-4 badge-bounce">{perfect?"🎯":pass?"🎉":"📚"}</div>
          <h2 className="text-3xl font-black text-white mb-2">{perfect?"Perfect Score!":pass?"Quiz Passed!":"Keep Studying!"}</h2>
          <div className="text-5xl font-black mb-2" style={{ color:perfect?"#10b981":pass?"#0078d4":"#ef4444" }}>{score}<span className="text-gray-500 text-2xl">/{mod.quiz.length}</span></div>
          <p className="text-gray-400 mb-4">{perfect?"+150 XP earned":pass?"+100 XP earned":"+50 XP earned"}</p>
          <div className="grid grid-cols-5 gap-2 my-6">
            {results.map((r,i)=><div key={i} className={`h-8 rounded-lg flex items-center justify-center text-sm font-bold ${r?"bg-green-500/30 text-green-400":"bg-red-500/30 text-red-400"}`}>{r?"✓":"✗"}</div>)}
          </div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={()=>navigate("module",mod.id)} className="btn-primary px-6 py-3 rounded-xl text-white font-bold text-sm">{pass?"Continue Learning":"Review Module"}</button>
            <button onClick={()=>navigate("leaderboard")} className="px-6 py-3 rounded-xl font-bold text-sm border border-gray-700 text-gray-300 hover:border-gray-500 transition-colors">See Leaderboard</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in p-4 md:p-6 max-w-2xl mx-auto">
      <button onClick={()=>navigate("module",mod.id)} className="flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-4">← Back</button>
      <div className="flex items-center justify-between mb-4">
        <div><h2 className="font-bold text-white">{mod.title}</h2><p className="text-xs text-gray-500">Question {curr+1} of {mod.quiz.length}</p></div>
        <div className="text-right"><div className="text-sm font-bold text-white">{score} correct</div><div className="text-xs text-gray-500">so far</div></div>
      </div>
      <div className="flex gap-1.5 mb-6">{mod.quiz.map((_,i)=><div key={i} className={`h-1.5 flex-1 rounded-full transition-all ${i<curr?"bg-blue-500":i===curr?"bg-blue-400":"bg-gray-700"}`}/>)}</div>
      <div className="bg-gray-900 rounded-2xl p-6 border border-gray-800 mb-4"><p className="text-white font-semibold text-base leading-relaxed">{q.q}</p></div>
      <div className="space-y-3 mb-6">
        {q.options.map((opt,idx)=>{
          let cls = "quiz-option bg-gray-900 rounded-xl p-4 w-full text-left text-sm text-gray-300 flex items-center gap-3";
          if (answered) { if (idx===q.correct) cls+=" correct"; else if (idx===selected) cls+=" wrong"; }
          return (
            <button key={idx} className={cls} onClick={()=>pick(idx)} disabled={answered}>
              <span className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0 ${answered&&idx===q.correct?"border-green-500 bg-green-500/20 text-green-400":answered&&idx===selected?"border-red-500 bg-red-500/20 text-red-400":"border-gray-600 text-gray-500"}`}>{String.fromCharCode(65+idx)}</span>
              {opt}
            </button>
          );
        })}
      </div>
      {answered && (
        <div className="fade-in">
          <div className={`rounded-xl p-4 mb-4 ${selected===q.correct?"bg-green-500/10 border border-green-500/30":"bg-red-500/10 border border-red-500/30"}`}>
            <p className="text-sm font-semibold" style={{ color:selected===q.correct?"#10b981":"#ef4444" }}>
              {selected===q.correct?"✓ Correct!":"✗ Incorrect"} — Answer: {q.options[q.correct]}
            </p>
          </div>
          <button onClick={next} className="btn-primary w-full py-3.5 rounded-xl text-white font-bold text-sm">{curr<mod.quiz.length-1?"Next Question →":"Finish Quiz 🎉"}</button>
        </div>
      )}
    </div>
  );
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function Leaderboard({ state, user }) {
  const all = [...FICTIONAL_STUDENTS, { name:`You (${user.name.split(' ')[0]})`, initials:user.name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase(), color:"#0078d4", xp:state.xp, badges:state.badges, isUser:true }].sort((a,b)=>b.xp-a.xp);
  const rankEmoji = ["🥇","🥈","🥉"];
  return (
    <div className="fade-in p-4 md:p-6 max-w-3xl mx-auto">
      <h1 className="text-2xl font-bold text-white mb-1 flex items-center gap-2"><Icon name="trophy" size={24} style={{ color:"#f59e0b" }}/> Leaderboard</h1>
      <p className="text-gray-400 text-sm mb-6">See how you rank on the Azure AI Fundamentals course.</p>
      <div className="grid grid-cols-3 gap-3 mb-6">
        {[all[1],all[0],all[2]].map((s,pi)=>{
          const rank = pi===0?2:pi===1?1:3;
          if (!s) return <div key={pi}/>;
          const hts = ["h-24","h-32","h-20"];
          return (
            <div key={s.name} className={`flex flex-col items-center ${pi===1?"-mt-4":""}`}>
              <div className={`w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold mb-1 ${s.isUser?"glow-blue":""}`} style={{ background:s.color+"30", border:`2px solid ${s.color}`, color:s.color }}>{s.initials}</div>
              <div className="text-xs font-semibold text-white text-center mb-1 truncate w-full px-1">{s.isUser?"You":s.name.split(' ')[0]}</div>
              <div className="text-xs text-gray-400 mb-2">{s.xp.toLocaleString()} XP</div>
              <div className={`w-full rounded-t-lg ${hts[pi]} flex items-center justify-center text-xl`} style={{ background:rank===1?"linear-gradient(135deg,#f59e0b,#d97706)":rank===2?"linear-gradient(135deg,#9ca3af,#6b7280)":"linear-gradient(135deg,#cd7c2f,#b45309)" }}>{rankEmoji[rank-1]}</div>
            </div>
          );
        })}
      </div>
      <div className="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
        {all.map((s,i)=>(
          <div key={s.name} className={`flex items-center gap-4 p-4 border-b border-gray-800 last:border-0 ${s.isUser?"bg-blue-900/10 border-l-2 border-l-blue-500":""}`}>
            <div className="w-8 text-center font-black text-lg" style={{ color:i===0?"#f59e0b":i===1?"#9ca3af":i===2?"#cd7c2f":"#4b5563" }}>{i<3?rankEmoji[i]:i+1}</div>
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0" style={{ background:s.color+"25", border:`2px solid ${s.color}`, color:s.color }}>{s.initials}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-semibold text-white text-sm">{s.name}</span>
                {s.isUser && <span className="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/30">You</span>}
                <LevelChip xp={s.xp}/>
              </div>
              <div className="text-xs text-gray-500 mt-0.5">{s.badges.length} badges</div>
            </div>
            <div className="text-right flex-shrink-0"><div className="font-bold text-white">{s.xp.toLocaleString()}</div><div className="text-xs text-gray-500">XP</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ACHIEVEMENTS ─────────────────────────────────────────────────────────────
function Achievements({ state }) {
  return (
    <div className="fade-in p-4 md:p-6 max-w-3xl mx-auto">
      <h1 className="text-2xl font-bold text-white mb-1">🏅 Achievements</h1>
      <p className="text-gray-400 text-sm mb-2">{state.badges.length}/{BADGES.length} badges earned</p>
      <ProgressBar value={state.badges.length} max={BADGES.length} color="#f59e0b" height={6}/>
      <div className="bg-gray-900 rounded-2xl border border-gray-800 p-5 mt-6 mb-6">
        <h3 className="font-bold text-white mb-4 flex items-center gap-2"><Icon name="lightning" size={16} style={{ color:"#f59e0b" }}/> Level Milestones</h3>
        <div className="space-y-3">
          {LEVELS.map(lvl=>{
            const reached = state.xp>=lvl.min;
            return (
              <div key={lvl.name} className={`flex items-center gap-3 p-3 rounded-xl ${reached?"":"opacity-40"}`} style={{ background:reached?lvl.color+"15":"rgba(255,255,255,0.03)", border:`1px solid ${reached?lvl.color+"40":"rgba(255,255,255,0.05)"}` }}>
                <span className="text-xl">{lvl.icon}</span>
                <div className="flex-1"><div className="font-semibold text-white text-sm">{lvl.name}</div><div className="text-xs text-gray-500">{lvl.min.toLocaleString()} XP</div></div>
                {reached && <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background:lvl.color+"30", color:lvl.color }}>✓</span>}
              </div>
            );
          })}
        </div>
      </div>
      <h3 className="font-bold text-white mb-4">All Badges</h3>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        {BADGES.map(b=>(
          <div key={b.id} className={`rounded-xl p-4 flex flex-col items-center gap-2 text-center transition-all ${state.badges.includes(b.id)?"bg-gray-800 border border-gray-600":"bg-gray-900 border border-gray-800 opacity-40"}`}>
            <div className={`text-3xl ${!state.badges.includes(b.id)?"grayscale":""}`}>{b.emoji}</div>
            <div className="text-xs font-semibold text-white">{b.name}</div>
            <div className="text-xs text-gray-400">{b.desc}</div>
            {b.rarity==="legendary"&&state.badges.includes(b.id)&&<span className="text-xs px-2 py-0.5 rounded-full font-bold bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">✨ Legendary</span>}
            {b.rarity==="rare"&&state.badges.includes(b.id)&&<span className="text-xs px-2 py-0.5 rounded-full font-bold bg-purple-500/20 text-purple-400 border border-purple-500/30">💜 Rare</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SIDEBAR CONTENT (shared between desktop sidebar and mobile drawer) ────────
function SidebarContent({ user, state, view, viewParam, navigate, onSignOut, onClose }) {
  const navItems = [
    { id:"dashboard", label:"Home", icon:"home" },
    { id:"leaderboard", label:"Leaderboard", icon:"trophy" },
    { id:"achievements", label:"Achievements", icon:"star" },
  ];
  const go = (v, p=null) => { navigate(v,p); if(onClose) onClose(); };
  return (
    <>
      {/* Logo */}
      <div className="p-5 border-b border-gray-800 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-lg" style={{ background:"linear-gradient(135deg,#0078d4,#00bcf2)" }}>☁️</div>
          <div><div className="font-bold text-white text-sm">Azure AI</div><div className="text-xs text-gray-500">Fundamentals LMS</div></div>
        </div>
        {onClose && <button onClick={onClose} className="text-gray-500 hover:text-white p-1 rounded-lg transition-colors"><Icon name="x" size={18}/></button>}
      </div>

      {/* User card */}
      <div className="p-4 border-b border-gray-800">
        <div className="flex items-center gap-3 mb-3">
          <UserAvatar user={user} size={36}/>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold text-white truncate">{user.name}</div>
            <LevelChip xp={state.xp}/>
          </div>
        </div>
        <div className="flex justify-between text-xs text-gray-500 mb-1">
          <span>{state.xp.toLocaleString()} XP</span>
          <span>{getLevelProgress(state.xp)}%</span>
        </div>
        <ProgressBar value={getLevelProgress(state.xp)} max={100} color="#0078d4" height={4}/>
        {state.streak>0 && <div className="text-xs text-orange-400 mt-2 flex items-center gap-1 streak-fire"><span>🔥</span>{state.streak}-day streak</div>}
      </div>

      {/* Navigation */}
      <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>go(item.id)} className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all text-left ${view===item.id&&!viewParam?"active text-white":"text-gray-400 hover:text-white"}`}>
            <Icon name={item.icon} size={16}/>{item.label}
          </button>
        ))}
        <div className="pt-3 pb-1">
          <div className="text-xs text-gray-600 uppercase px-3 mb-1 font-semibold tracking-wider">Modules</div>
          {MODULES.map((mod,i)=>{
            const done = mod.lessons.every(l=>state.completedLessons.includes(l.id))&&state.completedQuizzes[mod.id];
            const locked = i>0 && !MODULES.slice(0,i).every(prev=>prev.lessons.every(l=>state.completedLessons.includes(l.id)));
            return (
              <button key={mod.id} onClick={()=>!locked&&go("module",mod.id)} className={`sidebar-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-left ${view==="module"&&viewParam===mod.id?"active text-white":locked?"text-gray-600 cursor-not-allowed":"text-gray-400 hover:text-white"}`}>
                <span>{mod.icon}</span><span className="flex-1 truncate">{mod.shortTitle}</span>
                {done&&<span className="text-green-400">✓</span>}
                {locked&&<Icon name="lock" size={10}/>}
              </button>
            );
          })}
        </div>
      </nav>

      {/* Stats + Sign Out */}
      <div className="p-4 border-t border-gray-800">
        <div className="grid grid-cols-3 gap-2 text-center mb-3">
          <div><div className="text-sm font-bold text-white">{state.badges.length}</div><div className="text-xs text-gray-600">Badges</div></div>
          <div><div className="text-sm font-bold text-white">{state.completedLessons.length}</div><div className="text-xs text-gray-600">Lessons</div></div>
          <div><div className="text-sm font-bold text-white">{Object.keys(state.completedQuizzes).length}</div><div className="text-xs text-gray-600">Quizzes</div></div>
        </div>
        <button onClick={onSignOut} className="w-full flex items-center justify-center gap-2 py-2 rounded-lg text-xs text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all border border-gray-800 hover:border-red-500/30">
          <Icon name="logout" size={13}/> Sign out
        </button>
      </div>
    </>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [state, setState] = useState(loadState);
  const [view, setView] = useState("dashboard");
  const [viewParam, setViewParam] = useState(null);
  const [xpPopups, setXpPopups] = useState([]);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const popupId = useRef(0);

  // Auth init
  useEffect(() => {
    if (window._FB_ENABLED) {
      const unsub = window._fbAuth.onAuthStateChanged(fb => {
        setAuthUser(fb ? { uid:fb.uid, name:fb.displayName||fb.email.split('@')[0], email:fb.email, photoURL:fb.photoURL } : null);
        setAuthLoading(false);
      });
      return unsub;
    } else {
      const session = getDemoSession();
      if(session && session.name==='Google User'){saveDemoSession(null);setAuthUser(null);}else{setAuthUser(session);}
      setAuthLoading(false);
    }
  }, []);

  // Streak update
  useEffect(() => {
    if (!authUser) return;
    const today = new Date().toDateString();
    if (state.lastLogin !== today) {
      const yest = new Date(Date.now()-86400000).toDateString();
      const streak = state.lastLogin===yest ? state.streak+1 : 1;
      const nb = [...state.badges];
      if (streak>=3 && !nb.includes("on_fire")) nb.push("on_fire");
      const ns = { ...state, lastLogin:today, streak, badges:nb, sessionLessons:[] };
      setState(ns); saveState(ns);
    }
  }, [authUser]);

  const navigate = (v, p=null) => { setView(v); setViewParam(p); window.scrollTo(0,0); };
  const showXP = useCallback(amt => {
    const id = ++popupId.current;
    setXpPopups(prev=>[...prev,{id,amt}]);
    setTimeout(()=>setXpPopups(prev=>prev.filter(p=>p.id!==id)),1500);
  }, []);

  const signOut = async () => {
    if (window._FB_ENABLED) { try { await window._fbAuth.signOut(); } catch {} }
    else { demoSignOut(); }
    setAuthUser(null);
    setView("dashboard");
  };

  if (authLoading) return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#080c14",gap:16 }}>
      <div style={{ fontSize:"2rem" }}>☁️</div>
      <div style={{ width:36,height:36,border:"3px solid #1f2937",borderTopColor:"#0078d4",borderRadius:"50%",animation:"spin 0.8s linear infinite" }}/>
    </div>
  );

  if (!authUser) return <LoginView onLogin={setAuthUser}/>;

  const currentMod = viewParam ? MODULES.find(m=>m.id===viewParam) : null;
  const renderView = () => {
    if (view==="module"&&currentMod) return <ModuleView mod={currentMod} state={state} setState={setState} navigate={navigate} showXP={showXP}/>;
    if (view==="quiz"&&currentMod) return <QuizView mod={currentMod} state={state} setState={setState} navigate={navigate} showXP={showXP}/>;
    if (view==="leaderboard") return <Leaderboard state={state} user={authUser}/>;
    if (view==="achievements") return <Achievements state={state}/>;
    return <Dashboard state={state} modules={MODULES} navigate={navigate} user={authUser} showXP={showXP}/>;
  };

  return (
    <div className="min-h-screen flex">
      {/* XP popups */}
      {xpPopups.map(p=>(
        <div key={p.id} className="xp-pop" style={{ top:72, left:"50%", transform:"translateX(-50%)" }}>+{p.amt} XP ⚡</div>
      ))}

      {/* Mobile drawer overlay */}
      {drawerOpen && (
        <div className="fixed inset-0 z-50 flex md:hidden">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={()=>setDrawerOpen(false)}/>
          <div className="relative z-10 w-72 h-full flex flex-col drawer-open" style={{ background:"#080c14", borderRight:"1px solid #1f2937" }}>
            <SidebarContent user={authUser} state={state} view={view} viewParam={viewParam} navigate={navigate} onSignOut={signOut} onClose={()=>setDrawerOpen(false)}/>
          </div>
        </div>
      )}

      {/* Desktop sidebar */}
      <aside className="desktop-sidebar fixed top-0 left-0 h-screen w-60 flex flex-col z-40" style={{ background:"#080c14", borderRight:"1px solid #1f2937" }}>
        <SidebarContent user={authUser} state={state} view={view} viewParam={viewParam} navigate={navigate} onSignOut={signOut}/>
      </aside>

      {/* Main content */}
      <main className="flex-1 min-h-screen main-content overflow-x-hidden">
        {/* Top bar */}
        <div className="sticky top-0 z-30 border-b border-gray-800 flex items-center gap-3 px-4 py-3" style={{ background:"rgba(8,12,20,0.95)", backdropFilter:"blur(12px)" }}>
          {/* Hamburger — mobile only */}
          <button className="hamburger-btn p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 transition-all" onClick={()=>setDrawerOpen(true)}>
            <Icon name="menu" size={22}/>
          </button>
          <div className="flex items-center gap-2 md:hidden">
            <span className="font-bold text-white text-sm">Azure AI LMS</span>
          </div>
          <div className="flex-1"/>
          <div className="flex items-center gap-3">
            {state.streak>=1 && <span className="text-sm streak-fire hidden sm:flex items-center gap-1">🔥{state.streak}</span>}
            <div className="flex items-center gap-2 bg-gray-900 rounded-lg px-3 py-1.5 border border-gray-800">
              <Icon name="lightning" size={14} style={{ color:"#f59e0b" }}/>
              <span className="font-bold text-white text-sm">{state.xp.toLocaleString()}</span>
              <span className="text-xs text-gray-500 hidden sm:inline">XP</span>
            </div>
            <UserAvatar user={authUser} size={32}/>
          </div>
        </div>
        <div className="pb-6">{renderView()}</div>
      </main>
    </div>
  );
}

try {
  const loading = document.getElementById("loading");
  if (loading) loading.remove();
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  document.getElementById("root").innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#080c14;color:#ef4444;font-family:Inter,sans-serif;text-align:center;padding:2rem;">' +
    '<div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>' +
    '<div style="font-weight:700;margin-bottom:0.5rem;">Failed to load</div>' +
    '<div style="color:#6b7280;font-size:0.85rem;max-width:400px">' + e.message + '</div></div>';
}
</script>
</body>
</html>
